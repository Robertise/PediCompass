services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pedicompass_qdrant
    ports:
      - "6333:6333"
      - "6334:6334" # gRPC (optional, available if needed)
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
